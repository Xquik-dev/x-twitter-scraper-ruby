name: Publish Gem

on:
  workflow_dispatch:
  release:
    types: [published]

permissions: {}

concurrency:
  group: publish-gem-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    environment: rubygems
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          bundler-cache: true
          ruby-version: "4.0"

      - name: Publish to RubyGems.org
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
        with:
          await-release: "false"

      - name: Verify the published version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#v}"
          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag is not a supported version."
            exit 1
          fi

          for attempt in {1..30}; do
            if curl --connect-timeout 5 --fail --max-time 10 --silent \
              "https://rubygems.org/api/v2/rubygems/x-twitter-scraper/versions/${release_version}.json" \
              >/dev/null; then
              echo "RubyGems.org reports version ${release_version}."
              exit 0
            fi
            if (( attempt < 30 )); then
              sleep 5
            fi
          done

          echo "RubyGems.org did not report version ${release_version}."
          exit 1

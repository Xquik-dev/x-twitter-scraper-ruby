name: Publish Gem

on:
  workflow_dispatch:
  release:
    types: [published]

permissions: {}

concurrency:
  group: publish-gem-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish gem
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment:
      name: rubygems
      url: https://rubygems.org/gems/x-twitter-scraper
    permissions:
      contents: read
      id-token: write # Required for RubyGems trusted publishing.

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          bundler-cache: false
          ruby-version: "3.2"

      - name: Install dependencies
        run: bundle install

      - name: Build gem
        run: bundle exec rake build:gem

      - name: Configure RubyGems credentials (trusted publishing)
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Publish to RubyGems.org
        run: gem push x-twitter-scraper-*.gem
